type User {
  id: ID!
  googleId: String!
  email: String!
  name: String!
  picture: String
}

type Event {
  id: ID!
  title: String!
  description: String
  startDate: String!
  endDate: String!
  location: String
  creator: User!
  followers: [User!]!
  participants: [User!]!
}

type DraftEvent {
  title: String!
  description: String
  startDate: String!
  endDate: String!
  location: String
}

type AssistantResponse {
  text: String!
  draftEvent: DraftEvent
}

type Query {
  hello: String!
  me: User
  events: [Event!]!
  myEvents: [Event!]!
  joinedEvents: [Event!]!
  followedEvents: [Event!]!
}

type Mutation {
  loginWithGoogle(code: String!): User!

  createEvent(
    title: String!
    description: String
    startDate: String!
    endDate: String!
    location: String
    autoFollow: Boolean
  ): Event!

  updateEvent(
    id: ID!
    title: String
    description: String
    startDate: String
    endDate: String
    location: String
  ): Event!

  deleteEvent(id: ID!): Boolean!

  joinEvent(id: ID!): Event!
  leaveEvent(id: ID!): Event!
  followEvent(id: ID!): Event!
  unfollowEvent(id: ID!): Event!

  askAssistant(message: String!, history: [MessageInput!]): AssistantResponse!
}

input MessageInput {
  role: String!
  parts: [MessagePartInput!]!
}

input MessagePartInput {
  text: String!
}
