type User {
  id: ID!
  googleId: String!
  email: String!
  name: String!
  picture: String
}

type Category {
  id: ID!
  name: String!
}

type Destination {
  id: ID!
  name: String!
}

type Plan {
  id: ID!
  title: String!
  startDate: String!
  endDate: String!
  destinations: [Destination!]!
  userId: ID!
  googleEventId: String
}

type Place {
  id: ID!
  name: String!
  planId: ID!
  destination: Destination!
  category: Category!
  priceRange: String
  reviewLinks: [String!]!
  notes: String
  visitStatus: String!
}

type ScheduledActivity {
  id: ID!
  place: Place!
  startTime: String!
  endTime: String!
}

type DraftEvent {
  title: String!
  description: String
  startDate: String!
  endDate: String!
  location: String
}

type AssistantResponse {
  text: String!
  draftEvent: DraftEvent
}

type Query {
  hello: String!
  me: User

  categories: [Category!]!
  destinations: [Destination!]!

  myPlans: [Plan!]!
  plan(id: ID!): Plan

  placesForPlan(planId: ID!): [Place!]!
  recommendedPlaces(destinationId: ID!): [Place!]!

  scheduledActivitiesForPlan(planId: ID!): [ScheduledActivity!]!
}

type Mutation {
  loginWithGoogle(code: String!): User!

  createCategory(name: String!): Category!
  createDestination(name: String!): Destination!

  createPlan(
    title: String!
    startDate: String!
    endDate: String!
    destinationIds: [ID!]!
  ): Plan!

  updatePlan(
    id: ID!
    title: String
    startDate: String
    endDate: String
    destinationIds: [ID!]
  ): Plan!

  deletePlan(id: ID!): Boolean!

  createPlace(
    name: String!
    planId: ID!
    destinationId: ID!
    categoryId: ID!
    priceRange: String
    reviewLinks: [String!]
    notes: String
  ): Place!

  updatePlace(
    id: ID!
    name: String
    categoryId: ID
    priceRange: String
    reviewLinks: [String!]
    notes: String
    visitStatus: String
  ): Place!

  deletePlace(id: ID!): Boolean!

  createScheduledActivity(
    placeId: ID!
    startTime: String!
    endTime: String!
  ): ScheduledActivity!

  updateScheduledActivity(
    id: ID!
    placeId: ID
    startTime: String
    endTime: String
  ): ScheduledActivity!

  deleteScheduledActivity(id: ID!): Boolean!

  askAssistant(message: String!, history: [MessageInput!]): AssistantResponse!
}

input MessageInput {
  role: String!
  parts: [MessagePartInput!]!
}

input MessagePartInput {
  text: String!
}
