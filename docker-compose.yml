services:
  nginx-proxy:
    image: nginx:alpine
    container_name: journei-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 7

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/journei-frontend:latest
    container_name: journei-frontend
    # Note: We don't expose ports directly, Nginx proxy handles routing
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 7

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_LOWER}/journei-backend:latest
    container_name: journei-backend
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 7
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/journey-planner
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - FRONTEND_URL=https://${DOMAIN}
    depends_on:
      - mongodb

  mongodb:
    image: mongo:4.4
    container_name: journei-mongodb
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 7
    volumes:
      - mongodb_data:/data/db
    # Not exposing port to host for security; backend connects via internal Docker network

volumes:
  mongodb_data:
