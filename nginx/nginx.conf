events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Docker's embedded DNS server
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        # In production, replace this with your actual domain using sed or envsubst
        # Example: server_name journei.yourdomain.com;
        server_name _;

        # Route /graphql to the backend
        location /graphql {
            set $backend http://backend:4000;
            proxy_pass $backend/graphql;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Route everything else to the frontend
        location / {
            set $frontend http://frontend:80;
            proxy_pass $frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
